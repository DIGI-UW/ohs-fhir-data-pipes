# Builds and unit-tests the Java project and the controller image on every push
# and PR. The image is pushed to Docker Hub on master (rolling `latest`) and on
# `v*` release tags (immutable semver, e.g. 0.2.7-digi.1); PR builds build the
# image but skip the push.
#
# Uses the DIGI-UW org Docker Hub credentials (vars.DOCKERHUB_USERNAME +
# secrets.DOCKERHUB_TOKEN), matching OpenELIS-Global-2. The image namespace
# follows DOCKERHUB_USERNAME: <DOCKERHUB_USERNAME>/ohs-fhir-data-pipes-controller.
name: Build, Test and Publish

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build-test-publish:
    name: Build, test, and publish (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # license + spotless are skipped to match cloudbuild.yaml and the
      # Dockerfile build stage (license needs full .git context, spotless needs
      # an NPM/prettier toolchain not provisioned here).
      - name: Build and unit test
        run: |
          mvn install -DskipTests=true -Dlicense.skip=true -Dspotless.apply.skip=true -Dmaven.javadoc.skip=true -B -V --no-transfer-progress
          mvn -B test -Dlicense.skip=true -Dspotless.apply.skip=true --no-transfer-progress

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/ohs-fhir-data-pipes-controller
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      # Tests already ran above; skip them in the image build. push is gated on
      # master (rolling `latest`) and on `v*` release tags (immutable semver);
      # PRs build the image but do not publish it.
      - name: Build image (push on master and release tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
          build-args: SKIP_TESTS=true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
